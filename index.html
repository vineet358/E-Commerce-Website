<!DOCTYPE html>
<html lang = 'en'>
    <head>
        <title>Login Page</title>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <meta name = "description" content = "Navigation Page for Login">
        <link rel="stylesheet" href="navbar.css">
    </head>
    <body>
        <header class="navbar">
            <a href="data/Trendify.jpeg" class="slogan">Trendify</a>
            <ul>
                <li><a href="about.html">About</a></li>
                <li>
                    <a href="#">Services</a>
                    <div class="dropdown">
                        <a href="#">Web Development</a>
                        <a href="#">App Development</a>
                        <a href="#">SEO</a>
                    </div>
                </li>
                <li><a href="#">Portfolio</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </header>
        <div class="login-container">
            <h2>Login</h2>
            <form onsubmit="handleLogin(event)">
                <input type="text" id="username" placeholder="Username" required aria-label="Username">
                <input type="password" id="password" placeholder="Password" required aria-label="Password">
                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember Me</label>
                </div>
                
                <button type="submit">Login</button>
                <a href="#">Forgot Password?</a>
            </form>
        </div>
    <script src="navbar.js"></script>
    </body>
</html>
