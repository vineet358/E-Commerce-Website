<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive E-commerce Website</title>
    <link rel="stylesheet" href="stylee.css">
</head>
<body>
    
    <header class="navbar">
        <a href="#" class="logo">ShopLogo</a>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Products</a>
            <a href="#">Contact</a>
        </nav>
    </header>
    <div id="products" class="section">
        <h2>Our Products</h2>
        <div class="product-container">
            <!-- Product cards go here -->
            <div class="product-card">
                <h3>T-shirt</h3>
                <p>$10</p>
            </div>
            <div class="product-card">
                <h3>Jeans</h3>
                <p>$20</p>
            </div>
            <div class="product-card">
                <h3>Shoes</h3>
                <p>$30</p>
            </div>
            <div class="product-card">
                <h3>Watch</h3>
                <p>$50</p>
            </div>
        </div>
    </div>
    

    <section class="search-filter">
        <input type="text" id="search-bar" placeholder="Search for products..." oninput="searchProducts()">
        <select id="filter-category" onchange="filterProducts()">
            <option value="all">All Categories</option>
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="books">Books</option>
        </select>
    </section>
    
    </section>

    <script src="script.js"></script>
</body>
</html>
